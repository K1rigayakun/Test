<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum & Hall of Fame - Emerald Kingdom</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Poppins:wght@500;600;700&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ranks.css">
    <link rel="stylesheet" href="css/cosmetics.css">
    
    <style>
        /* CSS KHUSUS MUSEUM V2 */
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 50% 0%, #1a1a1a 0%, transparent 60%),
                url('https://www.transparenttextures.com/patterns/dark-leather.png');
        }

        /* HERO SECTION */
        .museum-hero {
            text-align: center;
            padding: 80px 0 60px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            position: relative;
        }

        .museum-title {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            background: linear-gradient(to bottom, #d4af37, #8a7018);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        /* LEADERBOARD SECTION (NEW) */
        .leaderboard-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 80px;
            align-items: flex-end; /* Supaya juara 1 paling tinggi */
            flex-wrap: wrap;
        }

        .podium-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.8) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            position: relative;
            width: 250px;
            transition: 0.3s;
        }
        
        /* Podium Heights */
        .podium-1 { height: 380px; border-color: gold; box-shadow: 0 0 50px rgba(255, 215, 0, 0.1); order: 2; z-index: 10; }
        .podium-2 { height: 320px; border-color: silver; order: 1; }
        .podium-3 { height: 280px; border-color: #cd7f32; order: 3; }

        .podium-card:hover { transform: translateY(-10px); }

        .rank-crown {
            font-size: 3rem; margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        .podium-avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            margin-bottom: 15px;
        }
        .podium-1 .podium-avatar { width: 100px; height: 100px; border-color: gold; }

        .podium-name { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; color: white; }
        .podium-wealth { font-family: 'Lato'; color: var(--emerald-glow); font-weight: bold; font-size: 1rem; }
        .podium-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-top: 10px; }

        /* GALLERY GRID */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .museum-frame {
            background: #000;
            border: 10px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            transition: 0.3s;
        }
        .museum-frame:hover { border-color: #333; transform: scale(1.02); }

        .frame-img { width: 100%; height: 250px; object-fit: cover; filter: grayscale(50%); transition: 0.5s; }
        .museum-frame:hover .frame-img { filter: grayscale(0%); }

        .plaque {
            background: linear-gradient(to bottom, #111, #000);
            padding: 20px;
            text-align: center;
            border-top: 1px solid #333;
        }

        .plaque h3 { font-family: 'Cinzel'; color: #ddd; margin-bottom: 5px; font-size: 1.1rem; }
        .plaque p { color: var(--gold-dark); font-size: 0.9rem; margin-bottom: 15px; }

        .owner-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px; border-radius: 50px;
            font-size: 0.8rem; color: white;
        }
        .owner-pill img { width: 25px; height: 25px; border-radius: 50%; }

        .sold-stamp {
            position: absolute; top: 15px; right: 15px;
            border: 2px solid var(--gold-primary); color: var(--gold-primary);
            padding: 5px 10px; font-family: 'Courier New'; font-weight: bold;
            background: rgba(0,0,0,0.8); transform: rotate(-10deg);
            z-index: 5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .leaderboard-container { flex-direction: column; align-items: center; }
            .podium-card { width: 100%; height: auto; order: initial !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <div class="logo"><a href="index.html">💎 EMERALD</a></div>
            <nav>
                <ul>
                    <li><a href="index.html">Kembali ke Lobi</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="museum-hero fade-in">
        <div class="container">
            <h1 class="museum-title">HALL OF FAME</h1>
            <p style="color: #888; letter-spacing: 2px; text-transform: uppercase;">
                Tempat Para Legenda Diabadikan
            </p>
        </div>
    </section>

    <div class="container section-container">
        
        <h3 class="section-title text-gold" style="text-align:center; margin-bottom:40px;">👑 Sultan Terkaya Minggu Ini</h3>
        
        <div id="leaderboardArea" class="leaderboard-container fade-in">
            <div class="loader-diamond"></div>
        </div>

        <div style="border-top: 1px solid #333; margin: 60px 0;"></div>
        
        <h3 class="section-title" style="text-align:center; margin-bottom:40px; color:white;">🏛️ Koleksi Terjual</h3>
        <div id="museumGrid" class="gallery-grid">
            </div>

    </div>

    <footer style="text-align:center; padding:40px 0; color:#444; font-size:0.8rem;">
        Data kekayaan diupdate secara real-time berdasarkan Audit Kerajaan.
    </footer>

    <script src="js/db.js"></script>
    <script src="js/global.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderLeaderboard();
            renderGallery();
        });

        // --- 1. RENDER LEADERBOARD (LOGIC V2) ---
        function renderLeaderboard() {
            const users = KingdomDB.getUsers();
            
            // Hitung Net Worth (Saldo + Total Harga Barang)
            const richList = users.map(u => {
                const assetVal = (u.history || []).reduce((sum, item) => sum + item.price, 0);
                return {
                    ...u,
                    netWorth: u.saldo + assetVal
                };
            });

            // Sortir dari yang terkaya
            richList.sort((a, b) => b.netWorth - a.netWorth);
            
            // Ambil Top 3
            const top3 = richList.slice(0, 3);
            const container = document.getElementById('leaderboardArea');
            container.innerHTML = '';

            // Render Podium (Urutan: 2, 1, 3 agar Juara 1 di tengah)
            const order = [1, 0, 2]; // Index array: Juara 2, Juara 1, Juara 3
            
            order.forEach(idx => {
                if (!top3[idx]) return; // Jaga-jaga jika user < 3

                const user = top3[idx];
                const rank = idx + 1; // 1, 2, 3
                
                let crown = '';
                let title = '';
                if(rank === 1) { crown = '👑'; title = 'THE EMPEROR'; }
                if(rank === 2) { crown = '🥈'; title = 'THE DUKE'; }
                if(rank === 3) { crown = '🥉'; title = 'THE KNIGHT'; }

                const html = `
                    <div class="podium-card podium-${rank} fade-in">
                        <div class="rank-crown">${crown}</div>
                        <img src="${user.avatar}" class="podium-avatar" onerror="this.src='assets/images/avatars/default.png'">
                        <div class="podium-name">${user.name}</div>
                        <div class="podium-wealth">${KingdomDB.formatRupiah(user.netWorth)}</div>
                        <div class="podium-title">${title}</div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // --- 2. RENDER GALLERY ---
        function renderGallery() {
            const items = KingdomDB.getItems();
            const grid = document.getElementById('museumGrid');
            
            // Filter hanya barang SOLD
            const soldItems = items.filter(i => i.status === 'sold');

            if (soldItems.length === 0) {
                grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#666;">Belum ada artefak di museum.</p>`;
                
                // Auto-Seed Dummy jika kosong (Agar terlihat bagus)
                if (items.length > 0) createDummySoldItem(); 
                return;
            }

            grid.innerHTML = ''; // Clear

            soldItems.forEach(item => {
                const finalPrice = KingdomDB.formatRupiah(item.currentBid);
                
                // Cari data pemenang untuk avatar
                const winner = KingdomDB.getUser(item.highestBidder) || { name: item.highestBidder, avatar: 'assets/images/avatars/default.png' };

                grid.innerHTML += `
                    <div class="museum-frame fade-in">
                        <div class="sold-stamp">SOLD</div>
                        <img src="${item.image}" class="frame-img" onerror="this.src='assets/images/items/placeholder.png'">
                        
                        <div class="plaque">
                            <h3>${item.name}</h3>
                            <p>Terjual: ${finalPrice}</p>
                            
                            <div class="owner-pill">
                                <img src="${winner.avatar}" onerror="this.src='assets/images/avatars/default.png'">
                                <span>${winner.name}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Fitur Demo: Buat 1 barang sold palsu jika museum kosong (Hanya visual)
        function createDummySoldItem() {
            const grid = document.getElementById('museumGrid');
            grid.innerHTML = `
                <div class="museum-frame fade-in">
                    <div class="sold-stamp">SOLD</div>
                    <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" class="frame-img">
                    <div class="plaque">
                        <h3>Ferrari 250 GTO (Legend)</h3>
                        <p>Terjual: Rp 750.000.000.000</p>
                        <div class="owner-pill">
                            <img src="assets/images/avatars/default.png">
                            <span>Admin Legend</span>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>

</body>
</html>
