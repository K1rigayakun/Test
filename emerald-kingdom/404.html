<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Tersesat | Emerald Kingdom</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato&family=Poppins:wght@700&family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    
    <style>
        /* CSS KHUSUS 404 (THEME: DIGITAL VOID) */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background: #000;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(5, 77, 54, 0.1) 0%, transparent 50%),
                repeating-linear-gradient(0deg, transparent 0px, transparent 1px, rgba(0, 255, 136, 0.03) 1px, rgba(0, 255, 136, 0.03) 2px);
            background-size: 100% 100%, 100% 4px;
        }

        .error-container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* GLITCH TEXT EFFECT 404 */
        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }

        .error-code {
            font-family: 'Poppins', sans-serif;
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            color: #fff;
            letter-spacing: -10px;
            position: relative;
        }

        .error-code::before,
        .error-code::after {
            content: '404';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
        }

        .error-code::before {
            left: 2px;
            text-shadow: -2px 0 #ff0000;
            clip-path: inset(44% 0 61% 0);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .error-code::after {
            left: -2px;
            text-shadow: -2px 0 #00ff88;
            clip-path: inset(50% 0 10% 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        /* TEXT DESCRIPTION */
        .error-title {
            font-family: 'Courier Prime', monospace;
            color: var(--gold-primary);
            font-size: 1.5rem;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .error-desc {
            color: #888;
            margin: 15px auto 40px;
            max-width: 400px;
            line-height: 1.6;
        }

        /* BUTTON */
        .btn-home {
            background: transparent;
            border: 1px solid var(--emerald-glow);
            color: var(--emerald-glow);
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .btn-home:hover {
            background: var(--emerald-glow);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            transform: scale(1.05);
        }

        /* ANIMATIONS */
        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 20% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(80% 0 5% 0); }
            40% { clip-path: inset(40% 0 30% 0); }
            60% { clip-path: inset(10% 0 80% 0); }
            80% { clip-path: inset(70% 0 10% 0); }
            100% { clip-path: inset(20% 0 50% 0); }
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            background: rgba(212, 175, 55, 0.5);
            width: 2px; height: 2px;
            border-radius: 50%;
            animation: floatUp 10s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="error-container fade-in">
        <div class="glitch-wrapper">
            <div class="error-code" data-text="404">404</div>
        </div>
        
        <h2 class="error-title">Area Terlarang</h2>
        <p class="error-desc">
            Halaman yang Anda cari telah hilang ditelan sejarah, atau mungkin disembunyikan oleh protokol keamanan VVIP.
        </p>

        <a href="index.html" class="btn-home">
            KEMBALI KE ISTANA
        </a>
    </div>

    <script>
        const particleContainer = document.getElementById('particles');
        
        for(let i=0; i<30; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 5 + 's';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particleContainer.appendChild(p);
        }
    </script>

</body>
</html>
