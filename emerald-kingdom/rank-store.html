<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Store - Emerald Kingdom</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/store.css"> <link rel="stylesheet" href="css/ranks.css">
    <link rel="stylesheet" href="css/cosmetics.css">
    
    <style>
        /* CSS KHUSUS TOKO V3 (INLINE FIXES) */
        
        /* 1. WALLET BAR (STICKY TOP) */
        .store-top-bar {
            background: rgba(10, 20, 15, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--emerald-dark);
            padding: 15px 0;
            position: sticky;
            top: 70px; /* Di bawah header utama */
            z-index: 80;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .wallet-flex {
            display: flex; justify-content: space-between; align-items: center;
        }

        .balance-display {
            font-family: 'Share Tech Mono';
            font-size: 1.5rem;
            color: var(--gold-primary);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            display: flex; align-items: center; gap: 10px;
        }

        .btn-plus {
            background: var(--emerald-glow); color: black; border: none;
            width: 30px; height: 30px; border-radius: 50%; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 10px var(--emerald-glow);
            transition: 0.3s;
        }
        .btn-plus:hover { transform: scale(1.1); background: white; }

        /* 2. RANK SCROLL (HORIZONTAL) */
        .rank-showcase {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px 5px;
            scroll-behavior: smooth;
        }
        .rank-showcase::-webkit-scrollbar { height: 6px; }
        .rank-showcase::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 10px; }

        /* 3. COSMETIC CARDS V3 */
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .item-card {
            background: rgba(30, 30, 30, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            display: flex; flex-direction: column;
            transition: 0.3s; position: relative;
        }
        .item-card:hover { border-color: var(--emerald-glow); transform: translateY(-5px); }

        /* Visual Stok Bar */
        .stock-bar-bg {
            height: 4px; width: 100%; background: #333; margin-top: 10px; border-radius: 2px;
        }
        .stock-bar-fill {
            height: 100%; background: #ff4444; border-radius: 2px;
            box-shadow: 0 0 5px #ff4444;
        }

        /* Voucher Area */
        .voucher-mini-form {
            display: flex; gap: 10px; max-width: 400px; margin-left: auto;
        }
        .voucher-input {
            background: black; border: 1px dashed #555; color: white;
            padding: 8px 15px; border-radius: 4px; text-transform: uppercase;
            font-family: monospace; flex: 1;
        }

        @media (max-width: 768px) {
            .store-top-bar { top: 60px; } /* Adjust header height mobile */
            .wallet-flex { flex-direction: column; align-items: flex-start; gap: 10px; }
            .voucher-mini-form { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <div class="logo"><a href="index.html">💎 EMERALD</a></div>
            <nav>
                <ul>
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="profile.html">Profil</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="store-top-bar">
        <div class="container wallet-flex">
            <div>
                <small style="color:#aaa;">Saldo Tersedia</small>
                <div class="balance-display">
                    <span id="userBalanceDisplay">Rp 0</span>
                    <button class="btn-plus" onclick="location.href='wallet.html'">+</button>
                </div>
            </div>
            
            <div class="voucher-mini-form">
                <input type="text" id="quickVoucher" class="voucher-input" placeholder="KODE PROMO">
                <button class="btn-outline" onclick="redeemQuick()">KLAIM</button>
            </div>
        </div>
    </div>

    <section class="section-container">
        <div class="container">
            <h2 class="section-title text-gold">⚜️ Kasta Bangsawan</h2>
            <p style="color:#888; margin-bottom:20px;">Tingkatkan status sosial Anda untuk membuka akses VVIP Room.</p>
            
            <div class="rank-showcase" id="rankContainer">
                <div class="loader-diamond"></div>
            </div>
        </div>
    </section>

    <section class="section-container" style="background: rgba(0,0,0,0.3); border-top: 1px solid #222;">
        <div class="container">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:30px;">
                <div>
                    <h2 class="section-title" style="color:var(--emerald-glow);">💎 Black Market (Kosmetik)</h2>
                    <p style="color:#888;">Bingkai langka dan efek visual terbatas.</p>
                </div>
                <span style="font-size:0.8rem; color:#666;">RESET SETIAP MINGGU</span>
            </div>

            <div class="store-grid" id="cosmeticContainer">
                </div>
        </div>
    </section>

    <script src="js/db.js"></script>
    <script src="js/global.js"></script>
    <script src="js/store.js"></script> <script>
        // Script Khusus Voucher Cepat
        function redeemQuick() {
            const code = document.getElementById('quickVoucher').value.trim().toUpperCase();
            if(!code) { showToast("Masukkan kode!", "error"); return; }
            
            // Panggil logic DB (Memerlukan user login)
            const session = JSON.parse(localStorage.getItem('kingdom_logged_in'));
            if(!session) return;

            const result = KingdomDB.redeemVoucher(session.username, code);
            if(result.success) {
                showToast(result.msg, "gold");
                document.getElementById('quickVoucher').value = '';
                // Refresh Saldo UI
                const user = KingdomDB.getUser(session.username);
                document.getElementById('userBalanceDisplay').innerText = KingdomDB.formatRupiah(user.saldo);
            } else {
                showToast(result.msg, "error");
            }
        }
    </script>

</body>
</html>
