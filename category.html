<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi - Emerald Kingdom</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Poppins:wght@500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ranks.css">
    <link rel="stylesheet" href="css/cosmetics.css">
    
    <style>
        /* CSS KHUSUS HALAMAN KATEGORI V2 */
        
        .category-hero {
            padding: 100px 0 80px;
            text-align: center;
            background: radial-gradient(circle at center, #0a1510 0%, #000 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            transition: background 0.5s;
        }

        /* Animated Icon Background */
        .category-hero::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            opacity: 0.03;
            pointer-events: none;
            filter: blur(5px);
            z-index: 0;
        }

        .hero-content { position: relative; z-index: 10; }

        .cat-icon-display {
            font-size: 5rem;
            margin-bottom: 15px;
            display: inline-block;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
            animation: floatIcon 4s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .cat-title-display {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: white;
            text-transform: capitalize;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .cat-desc-display {
            color: #aaa;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 10px auto 0;
        }

        /* FILTER PILLS (Floating) */
        .filter-bar-floating {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: -30px; /* Overlap Hero */
            position: relative;
            z-index: 20;
            padding: 0 20px;
        }

        .filter-btn {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins';
            font-size: 0.9rem;
            transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .filter-btn:hover {
            color: white;
            border-color: white;
            transform: translateY(-3px);
        }

        .filter-btn.active {
            background: var(--gold-primary);
            color: black;
            border-color: var(--gold-primary);
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
        }

        /* Empty State */
        .empty-cat {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 0;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            border: 1px dashed #333;
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <div class="logo"><a href="index.html">💎 EMERALD</a></div>
            <nav>
                <ul>
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="rank-store.html">Toko</a></li>
                    <li id="authLink"><a href="auth/login.html" class="btn-outline">Masuk</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="category-hero fade-in" id="heroSection">
        <div class="container hero-content">
            <div id="catIcon" class="cat-icon-display">✨</div>
            <h1 id="catTitle" class="cat-title-display">Semua Koleksi</h1>
            <p id="catDesc" class="cat-desc-display">Menampilkan seluruh harta karun yang tersedia di kerajaan.</p>
        </div>
    </section>

    <div class="filter-bar-floating fade-in">
        <button class="filter-btn" onclick="changeCategory('all')" id="btn-all">🔥 Semua</button>
        <button class="filter-btn" onclick="changeCategory('Arloji')" id="btn-Arloji">⌚ Arloji</button>
        <button class="filter-btn" onclick="changeCategory('Perhiasan')" id="btn-Perhiasan">💍 Perhiasan</button>
        <button class="filter-btn" onclick="changeCategory('Seni')" id="btn-Seni">🎨 Seni</button>
        <button class="filter-btn" onclick="changeCategory('Kendaraan')" id="btn-Kendaraan">🏎️ Kendaraan</button>
        <button class="filter-btn" onclick="changeCategory('Properti')" id="btn-Properti">🏰 Properti</button>
    </div>

    <div class="container section-container">
        <div id="categoryGrid" class="auction-grid">
            </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/global.js"></script>
    
    <script>
        // CONFIG: Ikon & Deskripsi per Kategori
        const catConfig = {
            'all': { icon: '✨', desc: 'Menampilkan seluruh harta karun yang tersedia di kerajaan.' },
            'Arloji': { icon: '⌚', desc: 'Koleksi penunjuk waktu dari pembuat jam legendaris dunia.' },
            'Perhiasan': { icon: '💍', desc: 'Berlian langka, emas murni, dan permata dari dasar bumi.' },
            'Seni': { icon: '🎨', desc: 'Lukisan, patung, dan artefak bersejarah bernilai tinggi.' },
            'Kendaraan': { icon: '🏎️', desc: 'Supercar, Hypercar, Yacht, dan Jet Pribadi.' },
            'Properti': { icon: '🏰', desc: 'Pulau pribadi, Penthouse, dan Kastil Eropa.' },
            'Pusaka': { icon: '⚔️', desc: 'Senjata legendaris para ksatria masa lalu.' }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const currentCat = params.get('cat') || 'all';
            renderCategoryPage(currentCat);
        });

        function changeCategory(catName) {
            // Update URL (Push State)
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('cat', catName);
            window.history.pushState({}, '', newUrl);
            
            renderCategoryPage(catName);
        }

        function renderCategoryPage(catName) {
            // 1. UPDATE HERO
            const config = catConfig[catName] || catConfig['all'];
            document.getElementById('catTitle').innerText = catName === 'all' ? 'Semua Koleksi' : catName;
            document.getElementById('catIcon').innerText = config.icon;
            document.getElementById('catDesc').innerText = config.desc;

            // 2. UPDATE BUTTONS
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${catName}`);
            if (activeBtn) activeBtn.classList.add('active');

            // 3. RENDER GRID (V2 STRUCTURE)
            const items = KingdomDB.getItems();
            const grid = document.getElementById('categoryGrid');
            
            // Animasi transisi
            grid.style.opacity = '0';
            grid.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                grid.innerHTML = '';
                grid.style.opacity = '1';
                grid.style.transform = 'translateY(0)';

                const filtered = items.filter(item => {
                    return item.status === 'active' && (catName === 'all' || item.category === catName);
                });

                if (filtered.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-cat">
                            <div style="font-size:3rem; margin-bottom:15px;">📭</div>
                            <h3 style="color:#666;">Kategori Kosong</h3>
                            <p style="color:#444;">Admin belum mengisi stok untuk kategori ini.</p>
                        </div>
                    `;
                    return;
                }

                // SORTING: VVIP first
                filtered.sort((a, b) => (b.access === 'vvip') - (a.access === 'vvip'));

                filtered.forEach(item => {
                    const price = KingdomDB.formatRupiah(item.currentBid);
                    
                    // Badge Logic
                    let badgeHTML = item.access === 'vvip' ? `<div class="card-badge badge-vvip">👑 VVIP</div>` : 
                                    item.access === 'vip' ? `<div class="card-badge badge-vip">⚜️ VIP</div>` : 
                                    `<div class="card-badge badge-live">🔴 LIVE</div>`;

                    // HTML STRUCTURE V2 (STICKY FOOTER COMPATIBLE)
                    const card = `
                        <div class="auction-card glass-panel fade-in">
                            <div class="card-image-box">
                                ${badgeHTML}
                                <img src="${item.image}" alt="${item.name}" onerror="this.src='assets/images/items/placeholder.png'">
                            </div>
                            
                            <div class="card-info">
                                <div class="card-cat">${item.category}</div>
                                <h3 class="card-title">${item.name}</h3>
                                
                                <div class="card-footer">
                                    <span class="card-price-label">Penawaran Tertinggi</span>
                                    <div class="card-price">${price}</div>
                                    
                                    <a href="auction-live.html?id=${item.id}" style="text-decoration:none;">
                                        <button class="btn-card-action">
                                            MASUK RUANGAN ➝
                                        </button>
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            }, 300);
        }
    </script>

</body>
</html>
