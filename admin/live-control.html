<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Studio - Emerald Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/admin.css">

    <style>
        /* CSS KHUSUS STUDIO V3 */
        body { background-color: #050505; }

        .studio-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR LIST ROOM */
        .room-list-panel {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 15px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            font-family: 'Poppins';
            font-weight: bold;
            color: white;
            display: flex; justify-content: space-between; align-items: center;
        }

        .room-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .room-item {
            padding: 12px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 6px;
            margin-bottom: 5px;
        }
        .room-item:hover { background: #222; }
        .room-item.active { background: rgba(0, 255, 136, 0.1); border: 1px solid var(--emerald-dark); }

        .room-status-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #555; margin-right: 8px;
        }
        .room-status-dot.live { background: red; box-shadow: 0 0 5px red; animation: blink 1s infinite; }
        .room-status-dot.sold { background: gold; }

        /* MAIN CONTROL AREA */
        .control-console {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 1. MONITOR */
        .monitor-display {
            background: black;
            border: 4px solid #333;
            border-radius: 12px;
            height: 250px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .monitor-overlay {
            position: absolute; top: 20px; left: 20px;
            font-family: 'Share Tech Mono'; color: #00ff88; font-size: 0.9rem;
            z-index: 10;
        }
        .target-img { height: 100%; width: 100%; object-fit: contain; opacity: 0.5; }
        
        .big-status {
            position: absolute;
            font-size: 4rem; font-weight: 900; font-family: 'Arial Black';
            text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 0 0 20px black;
            z-index: 5;
        }
        .st-live { color: red; text-shadow: 0 0 30px red; }
        .st-sold { color: gold; text-shadow: 0 0 30px gold; }

        /* 2. BUTTON DECK */
        .deck-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
        }
        
        .deck-btn {
            padding: 20px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; color: white;
            text-transform: uppercase; font-size: 0.9rem;
            transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .deck-btn:active { transform: translateY(3px); }
        .deck-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-green { background: #054d36; border-bottom: 4px solid #032b1f; }
        .btn-green:hover { background: #0b7a58; }
        
        .btn-yellow { background: #8a7018; border-bottom: 4px solid #5a4a10; }
        .btn-yellow:hover { background: #d4af37; color: black; }

        .btn-red { background: #5a1010; border-bottom: 4px solid #300; }
        .btn-red:hover { background: #ff4444; }

        /* 3. NARRATOR TOOLS */
        .narrator-box {
            background: #151515; padding: 20px; border-radius: 12px; border: 1px solid #333;
            flex-grow: 1;
        }
        .narrator-input {
            width: 100%; background: #000; border: 1px solid #444; color: gold;
            padding: 12px; font-family: 'Courier New'; margin-bottom: 10px;
        }
        .chip-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .text-chip {
            background: #222; border: 1px solid #444; color: #ccc;
            padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; cursor: pointer;
        }
        .text-chip:hover { background: #333; border-color: gold; color: gold; }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="studio-layout">
        
        <div class="room-list-panel">
            <div class="panel-header">
                <span>CHANNEL LIST</span>
                <button onclick="refreshRooms()" style="background:none; border:none; color:#00ff88; cursor:pointer;">↻</button>
            </div>
            <div class="room-list" id="roomListContainer">
                <p style="padding:20px; color:#666; text-align:center;">Memuat data...</p>
            </div>
            <div style="padding:15px; border-top:1px solid #333;">
                <a href="dashboard.html" style="color:#888; text-decoration:none; font-size:0.8rem;">← Kembali ke Dashboard</a>
            </div>
        </div>

        <div class="control-console">
            
            <div class="monitor-display">
                <div class="monitor-overlay">
                    TARGET: <span id="targetName">NONE</span><br>
                    BID: <span id="targetBid">Rp 0</span><br>
                    HOLDER: <span id="targetHolder">-</span>
                </div>
                <img id="targetImg" class="target-img" src="">
                <div id="bigStatus" class="big-status">OFFLINE</div>
            </div>

            <div class="deck-grid">
                <button class="deck-btn btn-green" onclick="broadcastSignal('LIVE')">
                    <span style="font-size:1.5rem;">▶</span> START
                </button>
                <button class="deck-btn btn-yellow" onclick="broadcastSignal('PAUSED')">
                    <span style="font-size:1.5rem;">⏸</span> PAUSE
                </button>
                <button class="deck-btn btn-red" onclick="forceSold()">
                    <span style="font-size:1.5rem;">🔨</span> SOLD
                </button>
                <button class="deck-btn" style="background:#222; border-bottom:4px solid #111;" onclick="resetItem()">
                    <span style="font-size:1.5rem;">↺</span> RESET
                </button>
            </div>

            <div class="narrator-box">
                <h4 style="color:var(--gold-primary); margin-bottom:10px;">🎙️ Narator (Voice of God)</h4>
                
                <div class="chip-row">
                    <span class="text-chip" onclick="fillMsg('Penawaran diterima! Ada lagi?')">"Penawaran diterima..."</span>
                    <span class="text-chip" onclick="fillMsg('Waktu tersisa 1 menit!')">"1 Menit lagi!"</span>
                    <span class="text-chip" onclick="fillMsg('Harga masih dibawah Reserve Price.')">"Reserve Price..."</span>
                    <span class="text-chip" onclick="fillMsg('Going Once... Going Twice...')">"Going Once..."</span>
                </div>

                <div style="display:flex; gap:10px;">
                    <input type="text" id="narratorInput" class="narrator-input" placeholder="Ketik pesan untuk semua user di room ini...">
                    <button class="btn-admin-action" style="width:100px; margin:0;" onclick="sendNarratorMsg()">KIRIM</button>
                </div>
                <small style="color:#666;">Pesan ini akan muncul di chatroom user sebagai 'SYSTEM' atau 'JURU LELANG'.</small>
            </div>

        </div>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/admin-control.js"></script> </body>
</html>
